<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기기 사양 조회 마스터 - 하늘</title>
    <style>
        :root { --blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 60px 20px; margin: 0; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; }
        .info-box { background: #e8f4ff; padding: 15px; border-radius: 12px; margin-bottom: 25px; line-height: 1.6; border: 1px solid #d0e7ff; }
        .info-text { font-size: 13px; color: #0056b3; font-weight: 500; margin: 0; }
        .search-box { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 30px; }
        input { width: 85%; padding: 16px; border: 1px solid #d2d2d7; border-radius: 14px; font-size: 17px; outline: none; }
        button { width: 93%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; cursor: pointer; margin-top: 15px; font-weight: 600; font-size: 17px; }
        #result { display: none; background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: left; animation: fadeInUp 0.4s ease-out; }
        .spec-item { margin-bottom: 18px; border-bottom: 1px solid #f5f5f7; padding-bottom: 12px; }
        .label { font-size: 12px; color: #86868b; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .value { font-size: 19px; font-weight: 600; color: #1d1d1f; }
        .wiki-link { display: inline-block; margin-top: 15px; padding: 12px 20px; background: #00a495; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .wiki-link:hover { background: #008577; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 기기 사양 조회 마스터</h1>
        
        <div class="info-box">
            <p class="info-text">
                ✅ <b>삼성:</b> 갤럭시 S7 ~ S26 및 최신 Z/A/탭 시리즈<br>
                ✅ <b>애플:</b> 아이폰 6s ~ 17e 및 최신 아이패드 시리즈
            </p>
        </div>

        <div class="search-box">
            <input type="text" id="q" placeholder="식별코드(iPhone17,1) 또는 모델번호(SM-S921N)" onkeypress="if(event.keyCode==13) find()">
            <button onclick="find()">사양 조회하기</button>
        </div>

        <div id="result">
            <div class="spec-item"><span class="label">정식 모델명</span><span id="resN" class="value">-</span></div>
            <div class="spec-item"><span class="label">식별코드 / 모델번호</span><span id="resI" class="value">-</span></div>
            <a id="wikiBtn" href="#" target="_blank" class="wiki-link">🌳 나무위키 상세 정보</a>
        </div>
    </div>

    <script>
        const db = {
            /* === 아이폰 시리즈 === */
            "iPhone8,1":"아이폰 6s","iPhone8,2":"아이폰 6s 플러스","iPhone8,4":"아이폰 SE (1세대)","iPhone9,1":"아이폰 7","iPhone9,3":"아이폰 7","iPhone9,2":"아이폰 7 플러스","iPhone9,4":"아이폰 7 플러스","iPhone10,1":"아이폰 8","iPhone10,4":"아이폰 8","iPhone10,2":"아이폰 8 플러스","iPhone10,5":"아이폰 8 플러스","iPhone10,3":"아이폰 X","iPhone10,6":"아이폰 X","iPhone11,8":"아이폰 XR","iPhone11,2":"아이폰 XS","iPhone11,4":"아이폰 XS 맥스","iPhone11,6":"아이폰 XS 맥스","iPhone12,1":"아이폰 11","iPhone12,3":"아이폰 11 프로","iPhone12,5":"아이폰 11 프로 맥스","iPhone12,8":"아이폰 SE (2세대)","iPhone13,1":"아이폰 12 미니","iPhone13,2":"아이폰 12","iPhone13,3":"아이폰 12 프로","iPhone13,4":"아이폰 12 프로 맥스","iPhone14,4":"아이폰 13 미니","iPhone14,5":"아이폰 13","iPhone14,2":"아이폰 13 프로","iPhone14,3":"아이폰 13 프로 맥스","iPhone14,6":"아이폰 SE (3세대)","iPhone14,7":"아이폰 14","iPhone14,8":"아이폰 14 플러스","iPhone15,2":"아이폰 14 프로","iPhone15,3":"아이폰 14 프로 맥스","iPhone15,4":"아이폰 15","iPhone15,5":"아이폰 15 플러스","iPhone16,1":"아이폰 15 프로","iPhone16,2":"아이폰 15 프로 맥스","iPhone17,3":"아이폰 16","iPhone17,4":"아이폰 16 플러스","iPhone17,1":"아이폰 16 프로","iPhone17,2":"아이폰 16 프로 맥스","iPhone17,5":"아이폰 17e","iPhone18,1":"아이폰 17 프로","iPhone18,2":"아이폰 17 프로 맥스",

            /* === 아이패드 시리즈 === */
            "iPad16,3":"아이패드 프로 11 (M4)","iPad16,4":"아이패드 프로 11 (M4)","iPad16,5":"아이패드 프로 13 (M4)","iPad16,6":"아이패드 프로 13 (M4)","iPad17,1":"아이패드 에어 11 (M4)","iPad17,2":"아이패드 에어 13 (M4)",

            /* === 갤럭시 S 시리즈 === */
            "SM-G930N":"갤럭시 S7","SM-G935N":"갤럭시 S7 엣지","SM-G950N":"갤럭시 S8","SM-G955N":"갤럭시 S8+","SM-G960N":"갤럭시 S9","SM-G965N":"갤럭시 S9+","SM-G970N":"갤럭시 S10e","SM-G973N":"갤럭시 S10","SM-G975N":"갤럭시 S10+","SM-G977N":"갤럭시 S10 5G","SM-G981N":"갤럭시 S20","SM-G986N":"갤럭시 S20+","SM-G988N":"갤럭시 S20 울트라","SM-G991N":"갤럭시 S21","SM-G996N":"갤럭시 S21+","SM-G998N":"갤럭시 S21 울트라","SM-S901N":"갤럭시 S22","SM-S906N":"갤럭시 S22+","SM-S908N":"갤럭시 S22 울트라","SM-S911N":"갤럭시 S23","SM-S916N":"갤럭시 S23+","SM-S918N":"갤럭시 S23 울트라","SM-S921N":"갤럭시 S24","SM-S926N":"갤럭시 S24+","SM-S928N":"갤럭시 S24 울트라","SM-S931N":"갤럭시 S25","SM-S936N":"갤럭시 S25+","SM-S938N":"갤럭시 S25 울트라","SM-S941N":"갤럭시 S26","SM-S946N":"갤럭시 S26+","SM-S948N":"갤럭시 S26 울트라",

            /* === 갤럭시 Z 시리즈 === */
            "SM-F741N":"갤럭시 Z 플립 6","SM-F956N":"갤럭시 Z 폴드 6","SM-F751N":"갤럭시 Z 플립 7","SM-F966N":"갤럭시 Z 폴드 7",

            /* === 갤럭시 A / 탭 시리즈 === */
            "SM-A356N":"갤럭시 A35 5G","SM-A526N":"갤럭시 A52s 5G","SM-A556N":"갤럭시 A55 5G","SM-X926N":"갤럭시 탭 S10 울트라","SM-X936N":"갤럭시 탭 S11 울트라"
        };

        function find() {
            const v = document.getElementById('q').value.trim();
            const found = db[v] || db[v.toUpperCase()];
            if(found) {
                document.getElementById('resN').innerText = found;
                document.getElementById('resI').innerText = v;
                
                // 나무위키 링크 생성 (한글 명칭 검색 대응)
                let wikiSearch = found.split('(')[0].trim();
                // '아이폰' 또는 '갤럭시' 뒤에 공백이 없는 경우를 대비해 나무위키 검색어 최적화
                document.getElementById('wikiBtn').href = `https://namu.wiki/w/${encodeURIComponent(wikiSearch)}`;
                
                document.getElementById('result').style.display = 'block';
            } else {
                alert("해당 기기 정보가 DB에 없습니다.");
            }
        }
    </script>
</body>
</html>
