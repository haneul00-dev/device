<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기기 사양 조회 마스터 - 하늘</title>
    <style>
        :root { --blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 60px 20px; margin: 0; }
        .container { max-width: 500px; width: 100%; text-align: center; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; color: #1d1d1f; }
        .status { font-size: 13px; color: #34c759; margin-bottom: 30px; font-weight: 600; }
        .search-box { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 30px; }
        input { width: 85%; padding: 16px; border: 1px solid #d2d2d7; border-radius: 14px; font-size: 17px; outline: none; }
        button { width: 93%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; cursor: pointer; margin-top: 15px; font-weight: 600; font-size: 17px; }
        #result { display: none; background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: left; animation: fadeInUp 0.4s ease-out; }
        .spec-item { margin-bottom: 18px; border-bottom: 1px solid #f5f5f7; padding-bottom: 12px; }
        .label { font-size: 12px; color: #86868b; display: block; margin-bottom: 4px; text-transform: uppercase; }
        .value { font-size: 19px; font-weight: 600; color: #1d1d1f; }
        .wiki-link { display: inline-block; margin-top: 15px; padding: 12px 20px; background: #00a495; color: white; text-decoration: none; border-radius: 10px; font-weight: 600; font-size: 14px; transition: 0.2s; }
        .wiki-link:hover { background: #008577; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Device Lookup Pro</h1>
        <p class="status">● 나무위키 연동 통합 DB 가동 중</p>
        <div class="search-box">
            <input type="text" id="q" placeholder="iPhone 식별코드 또는 삼성 모델번호" onkeypress="if(event.keyCode==13) find()">
            <button onclick="find()">조회하기</button>
        </div>
        <div id="result">
            <div class="spec-item"><span class="label">Model Name</span><span id="resN" class="value">-</span></div>
            <div class="spec-item"><span class="label">Identifier / Model No.</span><span id="resI" class="value">-</span></div>
            <a id="wikiBtn" href="#" target="_blank" class="wiki-link">🌳 나무위키에서 상세 사양 보기</a>
        </div>
    </div>
    <script>
        const db = {
            /* === iPhone === */
            "iPhone8,1":"iPhone 6s","iPhone8,2":"iPhone 6s Plus","iPhone8,4":"iPhone SE (1st Gen)","iPhone9,1":"iPhone 7","iPhone9,3":"iPhone 7","iPhone9,2":"iPhone 7 Plus","iPhone9,4":"iPhone 7 Plus","iPhone10,1":"iPhone 8","iPhone10,4":"iPhone 8","iPhone10,2":"iPhone 8 Plus","iPhone10,5":"iPhone 8 Plus","iPhone10,3":"iPhone X","iPhone10,6":"iPhone X","iPhone11,8":"iPhone XR","iPhone11,2":"iPhone XS","iPhone11,4":"iPhone XS Max","iPhone11,6":"iPhone XS Max","iPhone12,1":"iPhone 11","iPhone12,3":"iPhone 11 Pro","iPhone12,5":"iPhone 11 Pro Max","iPhone12,8":"iPhone SE (2nd Gen)","iPhone13,1":"iPhone 12 mini","iPhone13,2":"iPhone 12","iPhone13,3":"iPhone 12 Pro","iPhone13,4":"iPhone 12 Pro Max","iPhone14,4":"iPhone 13 mini","iPhone14,5":"iPhone 13","iPhone14,2":"iPhone 13 Pro","iPhone14,3":"iPhone 13 Pro Max","iPhone14,6":"iPhone SE (3rd Gen)","iPhone14,7":"iPhone 14","iPhone14,8":"iPhone 14 Plus","iPhone15,2":"iPhone 14 Pro","iPhone15,3":"iPhone 14 Pro Max","iPhone15,4":"iPhone 15","iPhone15,5":"iPhone 15 Plus","iPhone16,1":"iPhone 15 Pro","iPhone16,2":"iPhone 15 Pro Max","iPhone17,3":"iPhone 16","iPhone17,4":"iPhone 16 Plus","iPhone17,1":"iPhone 16 Pro","iPhone17,2":"iPhone 16 Pro Max","iPhone17,5":"iPhone 17e","iPhone18,1":"iPhone 17 Pro","iPhone18,2":"iPhone 17 Pro Max",
            /* === iPad === */
            "iPad16,3":"iPad Pro 11 (M4)","iPad16,4":"iPad Pro 11 (M4)","iPad16,5":"iPad Pro 13 (M4)","iPad16,6":"iPad Pro 13 (M4)","iPad17,1":"iPad Air 11 (M4)","iPad17,2":"iPad Air 13 (M4)",
            /* === Samsung Galaxy S === */
            "SM-G991N":"Galaxy S21","SM-S901N":"Galaxy S22","SM-S911N":"Galaxy S23","SM-S921N":"Galaxy S24","SM-S928N":"Galaxy S24 Ultra","SM-S931N":"Galaxy S25","SM-S936N":"Galaxy S25+","SM-S938N":"Galaxy S25 Ultra","SM-S941N":"Galaxy S26","SM-S946N":"Galaxy S26+","SM-S948N":"Galaxy S26 Ultra",
            /* === Samsung Galaxy Z === */
            "SM-F741N":"Galaxy Z Flip 6","SM-F956N":"Galaxy Z Fold 6","SM-F751N":"Galaxy Z Flip 7","SM-F966N":"Galaxy Z Fold 7",
            /* === Samsung Galaxy A / Tab === */
            "SM-A356N":"Galaxy A35 5G","SM-A556N":"Galaxy A55 5G","SM-X926N":"Galaxy Tab S10 Ultra","SM-X936N":"Galaxy Tab S11 Ultra"
        };

        function find() {
            const v = document.getElementById('q').value.trim();
            const found = db[v] || db[v.toUpperCase()];
            if(found) {
                document.getElementById('resN').innerText = found;
                document.getElementById('resI').innerText = v;
                
                // 나무위키 링크 생성 (기기 명칭에서 괄호 등 제거하여 검색 최적화)
                const searchName = found.split('(')[0].trim();
                document.getElementById('wikiBtn').href = `https://namu.wiki/w/${encodeURIComponent(searchName)}`;
                
                document.getElementById('result').style.display = 'block';
            } else {
                alert("해당 기기 정보가 DB에 없습니다.");
            }
        }
    </script>
</body>
</html>
