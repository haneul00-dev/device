<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기기 사양 조회 Live Master - 하늘</title>
    <style>
        :root { --blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 60px 20px; margin: 0; }
        .container { max-width: 450px; width: 100%; text-align: center; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .status { font-size: 13px; color: #86868b; margin-bottom: 30px; font-weight: 600; }
        .search-box { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 30px; }
        input { width: 85%; padding: 16px; border: 1px solid #d2d2d7; border-radius: 14px; font-size: 17px; outline: none; }
        button { width: 93%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; cursor: pointer; margin-top: 15px; font-weight: 600; font-size: 17px; }
        #result { display: none; background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: left; animation: fadeInUp 0.4s; }
        .spec-item { margin-bottom: 15px; border-bottom: 1px solid #f5f5f7; padding-bottom: 10px; }
        .label { font-size: 12px; color: #86868b; display: block; }
        .value { font-size: 18px; font-weight: 600; color: #1d1d1f; }
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Device Lookup Live</h1>
        <p id="st" class="status">전 세계 기기 데이터 동기화 중...</p>
        <div class="search-box">
            <input type="text" id="q" placeholder="예: iPhone17,1 또는 SM-S948N" onkeypress="if(event.keyCode==13) find()">
            <button onclick="find()">조회하기</button>
        </div>
        <div id="result">
            <div class="spec-item"><span class="label">Model Name</span><span id="resN" class="value">-</span></div>
            <div class="spec-item"><span class="label">Identifier / Model No.</span><span id="resI" class="value">-</span></div>
        </div>
    </div>

    <script>
        let db = {};

        // 가장 안정적인 오픈소스 CDN 주소로 변경했습니다.
        const APPLE_URL = 'https://cdn.jsdelivr.net/gh/fieldnotescommunities/ios-device-identifiers@master/ios-device-identifiers.json';
        const SAMSUNG_URL = 'https://cdn.jsdelivr.net/gh/skylot/jadx@master/jadx-core/src/main/resources/res/android-model-db.json';

        async function initDB() {
            try {
                // 두 소스에서 데이터를 병렬로 가져옵니다.
                const [appleRes, samsungRes] = await Promise.all([
                    fetch(APPLE_URL).then(r => r.json()),
                    fetch(SAMSUNG_URL).then(r => r.json())
                ]);
                
                db = { ...appleRes, ...samsungRes };
                
                document.getElementById('st').innerText = "● 전 세계 최신 DB 실시간 연결됨 (iOS 26/Android 16)";
                document.getElementById('st').style.color = "#34c759";
            } catch (e) {
                document.getElementById('st').innerText = "⚠️ 동기화 실패 (네트워크 확인 필요)";
                document.getElementById('st').style.color = "#ff3b30";
                console.error("데이터 로딩 에러:", e);
            }
        }

        function find() {
            const v = document.getElementById('q').value.trim();
            const found = db[v] || db[v.toUpperCase()];
            
            if(found) {
                document.getElementById('resN').innerText = found;
                document.getElementById('resI').innerText = v;
                document.getElementById('result').style.display = 'block';
            } else {
                alert("해당 기기 정보가 DB에 없습니다.\n코드가 정확한지 확인해 주세요!");
            }
        }

        initDB();
    </script>
</body>
</html>
