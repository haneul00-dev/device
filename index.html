<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>기기 사양 조회 마스터 - 하늘</title>
    <style>
        :root { --blue: #0071e3; --bg: #f5f5f7; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: var(--bg); display: flex; flex-direction: column; align-items: center; padding: 60px 20px; margin: 0; }
        .container { max-width: 450px; width: 100%; text-align: center; }
        h1 { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .status { font-size: 13px; color: #86868b; margin-bottom: 30px; }
        .search-box { background: white; padding: 30px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); margin-bottom: 30px; }
        input { width: 85%; padding: 16px; border: 1px solid #d2d2d7; border-radius: 14px; font-size: 17px; outline: none; transition: 0.3s; }
        button { width: 93%; padding: 16px; background: var(--blue); color: white; border: none; border-radius: 14px; cursor: pointer; margin-top: 15px; font-weight: 600; font-size: 17px; }
        #result { display: none; background: white; padding: 35px; border-radius: 24px; box-shadow: 0 10px 40px rgba(0,0,0,0.08); text-align: left; }
        .spec-item { margin-bottom: 20px; border-bottom: 1px solid #f5f5f7; padding-bottom: 12px; }
        .label { font-size: 12px; color: #86868b; display: block; margin-bottom: 5px; }
        .value { font-size: 19px; font-weight: 600; color: #1d1d1f; }
    </style>
</head>
<body>
    <div class="container">
        <h1>📱 Device Lookup</h1>
        <p id="st" class="status">데이터베이스 동기화 중...</p>
        <div class="search-box">
            <input type="text" id="q" placeholder="iPhone 식별자 또는 갤럭시 모델번호" onkeypress="if(event.keyCode==13) searchDevice()">
            <button onclick="searchDevice()">조회하기</button>
        </div>
        <div id="result">
            <div class="spec-item"><span class="label">Model Name</span><span id="resN" class="value">-</span></div>
            <div class="spec-item"><span class="label">Code / ID</span><span id="resI" class="value">-</span></div>
        </div>
    </div>
    <script>
        let db = {};
        async function load() {
            try {
                const appleReq = await fetch('https://raw.githubusercontent.com/fieldnotescommunities/ios-device-identifiers/master/ios-device-identifiers.json');
                const appleData = await appleReq.json();
                const samsungReq = await fetch('https://raw.githubusercontent.com/skylot/jadx/master/jadx-core/src/main/resources/res/android-model-db.json');
                const samsungData = await samsungReq.json();
                db = { ...appleData, ...samsungData };
                document.getElementById('st').innerText = "● Apple & Samsung 통합 DB 연결됨";
                document.getElementById('st').style.color = "#34c759";
            } catch(e) { document.getElementById('st').innerText = "로드 실패 (잠시 후 다시 시도)"; }
        }
        function searchDevice() {
            const v = document.getElementById('q').value.trim();
            const found = db[v] || db[v.toUpperCase()];
            if(found) {
                document.getElementById('resN').innerText = found;
                document.getElementById('resI').innerText = v;
                document.getElementById('result').style.display = 'block';
            } else { alert("정보를 찾을 수 없습니다."); }
        }
        load();
    </script>
</body>
</html>
